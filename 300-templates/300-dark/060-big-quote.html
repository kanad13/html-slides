<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Big Quote — Dark Deep Purple</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      background: #1a0533;
      color: #e9d5ff;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
    }

    .slide {
      max-width: 760px;
      width: 100%;
      text-align: center;
    }

    .open-quote {
      font-size: 8rem;
      line-height: 0.6;
      color: rgba(196, 181, 253, 0.3);
      display: block;
      margin-bottom: 16px;
    }

    blockquote {
      font-size: clamp(1.4rem, 3.5vw, 2.1rem);
      font-weight: 400;
      line-height: 1.65;
      color: #e9d5ff;
      font-style: italic;
      margin-bottom: 36px;
    }

    blockquote em {
      color: #c4b5fd;
      font-style: normal;
      font-weight: 600;
    }

    .close-quote {
      font-size: 8rem;
      line-height: 0;
      color: rgba(196, 181, 253, 0.3);
      display: block;
      text-align: right;
      margin-bottom: 32px;
    }

    .attribution {
      font-size: 0.97rem;
      color: #7c3aed;
      font-style: normal;
      font-family: system-ui, -apple-system, sans-serif;
      letter-spacing: 0.05em;
    }

    aside.notes {
      display: none;
    }
  </style>
</head>

<body>
  <div class="slide">
    <span class="open-quote">&ldquo;</span>
    <blockquote>
      The measure of intelligence is the ability to <em>change</em>.
    </blockquote>
    <span class="close-quote">&rdquo;</span>
    <p class="attribution">— Albert Einstein</p>
  </div>

  <aside class="notes">
    Pause after reading this quote. Let it settle.
    Apply it to the theme of organisational change in the next section.
    The word "change" is highlighted — emphasise it verbally.
  </aside>
</body>

</html>
